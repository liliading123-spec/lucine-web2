<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>
    Flexible Quartz Flooring Manufacturer | 1-3mm LVT & SPC for Southeast Asia & Africa
  </title>

  <meta name="description" content="Lucine Floor specializes in Quartz Sand Polymer Flooring. More flexible than traditional SPC. 1-3mm thickness, sizes 300*300mm & 6'x36'. Direct China Factory with low MOQ and high flexibility." />

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "Quartz Sand Polymer Flooring",
    "brand": "Lucine Floor",
    "material": "Quartz Sand + Polymer",
    "durability": "Flexible",
    "category": "Flooring",
    "description": "Flexible SPC/LVT alternative for tropical climates.",
    "additionalProperty": [
      {
        "@type": "PropertyValue",
        "name": "target_markets",
        "value": "Southeast Asia, Africa, Global"
      }
    ]
  }
  </script>

</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
